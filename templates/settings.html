<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>设置</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f2f2f7;color:#1c1c1e;min-height:100dvh}

/* ===== NAV ===== */
.nav{
  position:sticky;top:0;z-index:100;
  background:rgba(242,242,247,.85);
  backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom:1px solid rgba(0,0,0,.08);
  display:flex;align-items:center;
  padding:env(safe-area-inset-top,0) 16px 0;
  height:calc(56px + env(safe-area-inset-top,0));
}
.nav-back{
  display:flex;align-items:center;gap:4px;
  color:#007aff;font-size:16px;cursor:pointer;
  background:none;border:none;padding:0;
}
.nav-back svg{width:10px;height:18px;fill:none;stroke:#007aff;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.nav-title{position:absolute;left:50%;transform:translateX(-50%);font-size:17px;font-weight:600}

/* ===== SCROLL BODY ===== */
.page{padding:24px 16px calc(40px + env(safe-area-inset-bottom));max-width:640px;margin:0 auto}

/* ===== SECTION ===== */
.section{margin-bottom:32px}
.section-title{
  font-size:13px;font-weight:500;color:#6e6e73;
  text-transform:uppercase;letter-spacing:.5px;
  margin-bottom:8px;padding-left:4px;
}

/* ===== CARD ===== */
.card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}

/* ===== ROW ===== */
.row{
  display:flex;align-items:center;
  padding:14px 16px;
  border-bottom:1px solid rgba(0,0,0,.06);
  gap:12px;
}
.row:last-child{border-bottom:none}
.row-label{
  flex-shrink:0;width:148px;
  font-size:15px;color:#1c1c1e;line-height:1.3;
}
.row-hint{font-size:12px;color:#aeaeb2;margin-top:2px}
.row-input{
  flex:1;min-width:0;
  border:none;outline:none;background:transparent;
  font-size:15px;color:#1c1c1e;text-align:right;
  font-family:inherit;
}
.row-input::placeholder{color:#c7c7cc}
.row-input[type="number"]{-moz-appearance:textfield}
.row-input[type="number"]::-webkit-inner-spin-button,
.row-input[type="number"]::-webkit-outer-spin-button{-webkit-appearance:none}

/* toggle */
.toggle-wrap{margin-left:auto}
input[type="checkbox"].toggle{
  appearance:none;-webkit-appearance:none;
  width:51px;height:31px;background:#e5e5ea;
  border-radius:16px;position:relative;cursor:pointer;
  transition:background .25s;flex-shrink:0;
}
input[type="checkbox"].toggle::after{
  content:"";position:absolute;
  top:2px;left:2px;
  width:27px;height:27px;border-radius:50%;background:#fff;
  box-shadow:0 2px 4px rgba(0,0,0,.25);
  transition:transform .25s;
}
input[type="checkbox"].toggle:checked{background:#34c759}
input[type="checkbox"].toggle:checked::after{transform:translateX(20px)}

/* textarea row */
.row-textarea{align-items:flex-start;flex-direction:column;gap:6px}
.row-textarea .row-label{width:100%;font-size:13px;color:#6e6e73}
textarea.row-input{
  text-align:left;resize:none;width:100%;
  line-height:1.5;min-height:80px;
  padding:8px 12px;background:#f2f2f7;
  border-radius:10px;font-size:14px;
}

/* list row */
.row-list{align-items:flex-start;flex-direction:column;gap:6px}
.row-list .row-label{width:100%;font-size:13px;color:#6e6e73}
.tag-area{display:flex;flex-wrap:wrap;gap:6px;width:100%}
.tag{
  display:inline-flex;align-items:center;gap:4px;
  background:#e5f0ff;color:#007aff;
  font-size:13px;padding:4px 10px;border-radius:20px;
  cursor:default;
}
.tag-del{cursor:pointer;font-size:16px;line-height:1;color:#007aff;opacity:.6}
.tag-del:hover{opacity:1}
.tag-add{
  display:inline-flex;align-items:center;gap:4px;
  background:#f2f2f7;color:#007aff;
  font-size:13px;padding:4px 10px;border-radius:20px;
  cursor:pointer;border:1.5px dashed #c7c7cc;
}
.tag-input{
  flex:1;border:none;outline:none;background:transparent;
  font-size:14px;min-width:80px;padding:4px 0;
}

/* ===== SAVE BTN ===== */
.btn-save{
  display:block;width:100%;
  background:#007aff;color:#fff;
  font-size:17px;font-weight:600;
  border:none;border-radius:16px;
  padding:16px;cursor:pointer;
  transition:opacity .15s;
}
.btn-save:active{opacity:.75}
.btn-save:disabled{background:#c7c7cc;cursor:not-allowed}

/* ===== TOAST ===== */
#toast{
  position:fixed;bottom:calc(32px + env(safe-area-inset-bottom));
  left:50%;transform:translateX(-50%) translateY(10px);
  background:rgba(0,0,0,.78);color:#fff;
  font-size:14px;padding:10px 20px;border-radius:24px;
  opacity:0;transition:opacity .25s,transform .25s;
  pointer-events:none;white-space:nowrap;z-index:9999;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* loading skeleton */
.skeleton{background:linear-gradient(90deg,#f0f0f5 25%,#e8e8ed 50%,#f0f0f5 75%);background-size:200%;animation:sk 1.2s infinite;border-radius:8px;height:20px}
@keyframes sk{0%{background-position:200%}100%{background-position:-200%}}
</style>
</head>
<body>

<nav class="nav">
  <button class="nav-back" onclick="history.back()">
    <svg viewBox="0 0 10 18"><polyline points="9,1 1,9 9,17"/></svg>
    返回
  </button>
  <div class="nav-title">设置</div>
</nav>

<div class="page" id="page">
  <div class="section"><div class="section-title">加载中...</div><div class="card"><div class="row"><div class="skeleton" style="width:100%;height:18px"></div></div></div></div>
</div>

<div id="toast"></div>

<script>
// ===== 字段元信息 =====
// type: text | number | float | bool | list | textarea | password
const SCHEMA = [
  {
    title: "WebSocket 连接",
    fields: [
      { key:"ws_base",            label:"WS 地址",          hint:"ws://host:port",   type:"text" },
      { key:"ws_token",           label:"Access Token",      hint:"连接认证 Token",   type:"password" },
      { key:"group_id",           label:"默认群号",           hint:"发消息目标群",     type:"text" },
      { key:"ws_reconnect_delay", label:"重连等待（秒）",     hint:"断线后等待时间",   type:"number" },
      { key:"ws_max_retries",     label:"最大重连次数",       hint:"0=无限",           type:"number" },
    ]
  },
  {
    title: "AI 身份",
    fields: [
      { key:"bot_name",    label:"Bot 名称",   hint:"梦梦",   type:"text" },
      { key:"target_user", label:"目标用户",   hint:"用户昵称", type:"text" },
    ]
  },
  {
    title: "LLM 配置",
    fields: [
      { key:"llm_endpoint",    label:"API 端点",       type:"text" },
      { key:"llm_key",         label:"API Key",        type:"password" },
      { key:"llm_model",       label:"模型名称",        type:"text" },
      { key:"llm_temperature", label:"Temperature",    hint:"0.0 ~ 2.0",  type:"float" },
      { key:"embed_model",     label:"Embedding 模型", type:"text" },
      { key:"embed_dimension", label:"Embedding 维度", type:"number" },
    ]
  },
  {
    title: "辅助模型",
    fields: [
      { key:"assistant_endpoint", label:"端点",   type:"text" },
      { key:"assistant_key",      label:"Key",    type:"password" },
      { key:"assistant_model",    label:"模型",   type:"text" },
      { key:"sample_lines",       label:"采样行数", type:"number" },
    ]
  },
  {
    title: "思考行为",
    fields: [
      { key:"max_tool_loops",          label:"最大工具循环次数", type:"number" },
      { key:"correction_wait_seconds", label:"Correction 等待（秒）", type:"number" },
    ]
  },
  {
    title: "消息处理",
    fields: [
      { key:"reply_keywords",      label:"回复关键词",       hint:"逗号分隔",   type:"list" },
      { key:"max_segment_length",  label:"单段最大字符数",    type:"number" },
      { key:"segment_send_interval", label:"分段发送间隔（秒）", type:"float" },
      { key:"max_history_turns",   label:"最大对话轮数",      type:"number" },
    ]
  },
  {
    title: "拦截与过滤",
    fields: [
      { key:"block_patterns",   label:"拦截规则（正则）", type:"list" },
      { key:"filter_patterns",  label:"过滤规则（正则）", type:"list" },
    ]
  },
  {
    title: "主动发言",
    fields: [
      { key:"active_interval_seconds", label:"主动发言间隔（秒）", type:"number" },
      { key:"active_groups",           label:"主动发言群号",       type:"list" },
      { key:"active_speak_prompt",     label:"主动发言提示词",     type:"textarea" },
    ]
  },
  {
    title: "WebUI",
    fields: [
      { key:"webui_host",             label:"监听地址",         hint:"0.0.0.0",  type:"text" },
      { key:"webui_port",             label:"端口",             hint:"5000",     type:"number" },
      { key:"webui_debug",            label:"Debug 模式",                        type:"bool" },
      { key:"webui_split_chars",      label:"分段标点",          hint:"遇到这些字符切断", type:"text" },
      { key:"webui_segment_max_len",  label:"单段最大字符（WebUI）", type:"number" },
      { key:"webui_segment_interval", label:"分段间隔（WebUI，秒）", type:"float" },
      { key:"webui_user_name",        label:"用户显示名称",      type:"text" },
      { key:"webui_bot_avatar",       label:"Bot 头像路径",      type:"text" },
      { key:"webui_user_avatar",      label:"用户头像路径",      type:"text" },
    ]
  },
  {
    title: "日志",
    fields: [
      { key:"app_log_file",    label:"日志文件名",       type:"text" },
      { key:"max_log_size_kb", label:"最大日志大小（KB）", hint:"超出自动清空", type:"number" },
    ]
  },
  {
    title: "指令系统",
    fields: [
      { key:"command_prefix", label:"指令前缀", hint:"/meng", type:"text" },
    ]
  },
];

// ===== 状态 =====
let _cfg = {};
const _inputs = {}; // key → { type, getVal, setVal }

// ===== Toast =====
function toast(msg, dur=2200){
  const el=document.getElementById("toast");
  el.textContent=msg;
  el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"), dur);
}

// ===== 构建 UI =====
function buildUI(cfg){
  _cfg = cfg;
  const page = document.getElementById("page");
  page.innerHTML = "";

  for(const section of SCHEMA){
    // 过滤掉 cfg 中不存在的字段（可选：保留所有已知字段）
    const visible = section.fields.filter(f => f.key in cfg || true);
    if(!visible.length) continue;

    const sec = document.createElement("div");
    sec.className = "section";

    const title = document.createElement("div");
    title.className = "section-title";
    title.textContent = section.title;
    sec.appendChild(title);

    const card = document.createElement("div");
    card.className = "card";

    for(const field of visible){
      const val = cfg[field.key];
      if(val === undefined) continue; // 只显示 yaml 中存在的字段
      card.appendChild(buildRow(field, val));
    }

    if(!card.children.length) continue;
    sec.appendChild(card);
    page.appendChild(sec);
  }

  // 保存按钮
  const saveWrap = document.createElement("div");
  saveWrap.style.marginTop = "8px";
  const btn = document.createElement("button");
  btn.className = "btn-save";
  btn.id = "btn-save";
  btn.textContent = "保存配置";
  btn.onclick = saveAll;
  saveWrap.appendChild(btn);
  page.appendChild(saveWrap);
}

function buildRow(field, val){
  const {key, label, hint, type} = field;

  if(type === "textarea"){
    const row = document.createElement("div");
    row.className = "row row-textarea";
    const lbl = document.createElement("div");
    lbl.className = "row-label";
    lbl.textContent = label;
    const ta = document.createElement("textarea");
    ta.className = "row-input";
    ta.value = val ?? "";
    ta.rows = 3;
    ta.setAttribute("autocomplete","off");
    row.appendChild(lbl);
    row.appendChild(ta);
    _inputs[key] = { type, getVal: ()=>ta.value };
    return row;
  }

  if(type === "list"){
    const row = document.createElement("div");
    row.className = "row row-list";
    const lbl = document.createElement("div");
    lbl.className = "row-label";
    lbl.textContent = label + (hint ? ` — ${hint}` : "");
    row.appendChild(lbl);

    const arr = Array.isArray(val) ? [...val] : (val ? String(val).split(",").map(s=>s.trim()) : []);
    const tagArea = document.createElement("div");
    tagArea.className = "tag-area";

    function renderTags(list){
      tagArea.innerHTML = "";
      list.forEach((item, i)=>{
        const tag = document.createElement("span");
        tag.className = "tag";
        tag.textContent = item;
        const del = document.createElement("span");
        del.className = "tag-del";
        del.textContent = "×";
        del.onclick = ()=>{ list.splice(i,1); renderTags(list); };
        tag.appendChild(del);
        tagArea.appendChild(tag);
      });
      // 添加按钮
      const addBtn = document.createElement("span");
      addBtn.className = "tag-add";
      addBtn.textContent = "+ 添加";
      addBtn.onclick = ()=>{
        const v = prompt("输入新值：");
        if(v && v.trim()){ list.push(v.trim()); renderTags(list); }
      };
      tagArea.appendChild(addBtn);
    }

    renderTags(arr);
    row.appendChild(tagArea);
    _inputs[key] = { type, getVal: ()=>arr };
    return row;
  }

  if(type === "bool"){
    const row = document.createElement("div");
    row.className = "row";
    const lbl = document.createElement("div");
    lbl.className = "row-label";
    lbl.innerHTML = `<div>${label}</div>${hint?`<div class="row-hint">${hint}</div>`:""}`;
    const wrap = document.createElement("div");
    wrap.className = "toggle-wrap";
    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.className = "toggle";
    cb.checked = !!val;
    wrap.appendChild(cb);
    row.appendChild(lbl);
    row.appendChild(wrap);
    _inputs[key] = { type, getVal: ()=>cb.checked };
    return row;
  }

  // text / number / float / password
  const row = document.createElement("div");
  row.className = "row";

  const lbl = document.createElement("div");
  lbl.className = "row-label";
  lbl.innerHTML = `<div>${label}</div>${hint?`<div class="row-hint">${hint}</div>`:""}`;

  const inp = document.createElement("input");
  inp.className = "row-input";
  inp.type = type==="password" ? "password" : (type==="number"||type==="float") ? "number" : "text";
  if(type==="float") inp.step="any";
  inp.value = val ?? "";
  inp.placeholder = hint || "";
  inp.autocomplete = type==="password" ? "new-password" : "off";

  row.appendChild(lbl);
  row.appendChild(inp);
  _inputs[key] = {
    type,
    getVal: ()=> type==="number" ? parseInt(inp.value)||0
                : type==="float" ? parseFloat(inp.value)||0
                : inp.value
  };
  return row;
}

// ===== 保存 =====
async function saveAll(){
  const btn = document.getElementById("btn-save");
  btn.disabled = true;
  btn.textContent = "保存中...";

  const updates = {};
  for(const [key, ctrl] of Object.entries(_inputs)){
    updates[key] = ctrl.getVal();
  }

  try{
    const r = await fetch("/yaml_config",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(updates)
    });
    const d = await r.json();
    if(d.ok){ toast("✅ 配置已保存"); }
    else { toast("❌ 保存失败"); }
  }catch(e){
    toast("❌ 网络错误："+e.message);
  }

  btn.disabled = false;
  btn.textContent = "保存配置";
}

// ===== 初始化 =====
(async()=>{
  try{
    const r = await fetch("/yaml_config");
    const cfg = await r.json();
    buildUI(cfg);
  }catch(e){
    document.getElementById("page").innerHTML=`<p style="color:red;padding:20px">加载配置失败：${e.message}</p>`;
  }
})();
</script>
</body>
</html>
