<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
<title>梦梦</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body,html{width:100%;height:100dvh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:#ededed;overflow:hidden;position:fixed}
.app-container{display:flex;flex-direction:column;width:100%;height:100dvh;position:relative;overflow:hidden}

/* NAV */
.nav-bar{height:88px;padding-top:40px;display:flex;align-items:center;justify-content:space-between;padding-left:16px;padding-right:16px;background:#ededed;position:relative;flex-shrink:0;z-index:50}
.nav-left{display:flex;align-items:center}
.icon-nav{width:24px;height:24px;object-fit:contain;cursor:pointer}
.badge{background:#dbdbdb;color:#000;font-size:14px;padding:2px 8px;border-radius:12px;margin-left:4px}
.nav-title{font-size:18px;font-weight:500;position:absolute;left:50%;transform:translateX(-50%);bottom:12px}

/* CHAT */
.chat-content{flex:1;background:#f3f3f3;overflow-y:auto;padding:0 12px 15px;display:flex;flex-direction:column;-webkit-overflow-scrolling:touch;position:relative;z-index:10}

/* TIME */
.time-tag{align-self:center;color:#b2b2b2;font-size:12px;margin:16px 0 8px}

/* ROW */
.msg-row{display:flex;width:100%;margin-top:12px;align-items:flex-start}
.msg-left{flex-direction:row}
.msg-right{flex-direction:row-reverse}

/* AVATAR */
.chat-avatar{width:42px;height:42px;min-width:42px;border-radius:4px;object-fit:cover;flex-shrink:0;background:#ccc}

/* WRAPPER */
.msg-wrapper{margin:0 10px;max-width:70%;display:flex;flex-direction:column;min-width:0}

/* BUBBLE */
.msg-bubble{padding:10px 12px;border-radius:6px;font-size:16px;position:relative;min-height:40px;display:inline-flex;align-items:center;word-break:break-all;width:fit-content;line-height:1.5}
.msg-left .msg-bubble{background:#fff;color:#000;align-self:flex-start}
.msg-left .msg-bubble::before{content:"";position:absolute;top:14px;left:-10px;border:5px solid transparent;border-right-color:#fff}
.msg-right .msg-bubble{background:#95ec69;color:#000;align-self:flex-end}
.msg-right .msg-bubble::before{content:"";position:absolute;top:14px;right:-10px;border:5px solid transparent;border-left-color:#95ec69}

/* TYPING */
.typing-bubble .dot-wrap{display:flex;gap:4px;align-items:center;height:20px}
.typing-bubble .dot{width:7px;height:7px;border-radius:50%;background:#bbb;animation:bounce 1.2s infinite ease-in-out}
.typing-bubble .dot:nth-child(2){animation-delay:.2s}
.typing-bubble .dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}

/* INPUT */
.input-bar{background:#f7f7f7;border-top:1px solid #dcdcdc;padding:10px 12px calc(10px + env(safe-area-inset-bottom)) 12px;display:flex;align-items:center;gap:12px;flex-shrink:0;min-height:60px;position:relative;z-index:2000}
.input-wrapper{flex:1;min-width:0;background:#fff;border-radius:8px;display:flex;align-items:center;padding:8px 10px;min-height:40px}
#message-input{flex:1;min-width:0;width:100%;border:none;outline:none;font-size:16px;background:transparent;line-height:1.4;color:#000;-webkit-user-select:text;user-select:text}
.icon-mic{width:22px;height:22px}
.icon-action{width:28px;height:28px;object-fit:contain;cursor:pointer}
#btn-send{background:none;border:none;padding:0;cursor:pointer;display:flex;align-items:center}
@media screen and (max-height:550px){.input-bar{padding-bottom:10px}}

/* LOADING BAR */
#loading-bar{position:fixed;top:0;left:0;height:3px;background:#07c160;width:0;transition:width .3s ease;z-index:9999}
</style>
</head>
<body>
<div id="loading-bar"></div>
<div class="app-container">

  <header class="nav-bar">
    <div class="nav-left">
      <img src="/icons/index/shangyibu.png" class="icon-nav" onerror="this.style.display='none'">
    </div>
    <div class="nav-title" id="chat-title">梦梦</div>
    <div class="nav-right">
      <img src="/icons/index/gengduo.png" class="icon-nav" id="btn-settings" onerror="this.style.display='none'" title="设置">
    </div>
  </header>

  <main class="chat-content" id="chat-area"></main>

  <footer class="input-bar">
    <img src="/icons/index/yuyin.png"    class="icon-action" onerror="this.style.display='none'">
    <div class="input-wrapper">
      <input type="text" id="message-input" placeholder="发消息" autocomplete="off">
      <img src="/icons/index/maikefeng.png" class="icon-mic" onerror="this.style.display='none'">
    </div>
    <img src="/icons/index/biaoqing.png" class="icon-action" onerror="this.style.display='none'">
    <button id="btn-send" aria-label="发送">
      <img src="/icons/index/jiahao.png" class="icon-action" onerror="this.replaceWith(mkSendText())">
    </button>
  </footer>

</div>
<script>
// ===== 工具 =====
let CFG = {};

function mkSendText(){
  const s=document.createElement("span");
  s.textContent="发送";
  s.style.cssText="font-size:15px;color:#07c160;font-weight:600;padding:0 4px";
  return s;
}

function nowHHMM(){
  const d=new Date();
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

const chatArea = document.getElementById("chat-area");
const input    = document.getElementById("message-input");
const loadBar  = document.getElementById("loading-bar");
let lastMsgTime = 0;

function setLoading(on){
  loadBar.style.width = on ? "60%" : "100%";
  if(!on) setTimeout(()=>{ loadBar.style.width="0"; }, 400);
}

function scrollBottom(){ chatArea.scrollTop = chatArea.scrollHeight; }

// ===== 渲染单条气泡 =====
function appendTimeTagIfNeeded(ts){
  const t = ts || Date.now();
  if(t - lastMsgTime > 5*60*1000){
    const el=document.createElement("div");
    el.className="time-tag";
    el.textContent=nowHHMM();
    chatArea.appendChild(el);
  }
  lastMsgTime = t;
}

function appendBubble(role, text){
  const isRight = role==="user";
  const row = document.createElement("div");
  row.className=`msg-row ${isRight?"msg-right":"msg-left"}`;

  const av = document.createElement("img");
  av.className="chat-avatar";
  av.src = isRight ? (CFG.user_avatar||"") : (CFG.bot_avatar||"");
  av.onerror=()=>{ av.style.background=isRight?"#07c160":"#aaa"; av.removeAttribute("src"); };

  const wrapper=document.createElement("div");
  wrapper.className="msg-wrapper";

  const bubble=document.createElement("div");
  bubble.className="msg-bubble";
  bubble.textContent=text;

  wrapper.appendChild(bubble);
  row.appendChild(av);
  row.appendChild(wrapper);
  chatArea.appendChild(row);
  scrollBottom();
  return bubble;
}

// ===== 打字动画 =====
let typingRow = null;
function showTyping(){
  if(typingRow) return;
  const row=document.createElement("div");
  row.className="msg-row msg-left";
  typingRow=row;

  const av=document.createElement("img");
  av.className="chat-avatar";
  av.src=CFG.bot_avatar||"";
  av.onerror=()=>{ av.style.background="#aaa"; av.removeAttribute("src"); };

  const wrapper=document.createElement("div");
  wrapper.className="msg-wrapper";
  const bubble=document.createElement("div");
  bubble.className="msg-bubble typing-bubble";
  bubble.innerHTML=`<div class="dot-wrap"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  wrapper.appendChild(bubble);
  row.appendChild(av);
  row.appendChild(wrapper);
  chatArea.appendChild(row);
  scrollBottom();
}
function hideTyping(){
  if(typingRow){ typingRow.remove(); typingRow=null; }
}

// ===== 加载历史（按分段还原）=====
async function loadHistory(){
  try{
    const r = await fetch("/history");
    const msgs = await r.json();
    if(!msgs.length) return;

    appendTimeTagIfNeeded(0); // 强制显示时间标签

    for(const msg of msgs){
      const segs = msg.segments || [msg.content];
      for(const seg of segs){
        appendBubble(msg.role, seg);
      }
    }
  }catch(e){ console.warn("加载历史失败",e); }
}

// ===== 加载配置 =====
async function loadConfig(){
  try{
    const r = await fetch("/config");
    CFG = await r.json();
    document.getElementById("chat-title").textContent = CFG.chat_title||CFG.bot_name||"梦梦";
    document.title = CFG.chat_title||CFG.bot_name||"梦梦";
  }catch(e){}
}

// ===== 发送 =====
let isSending=false;

async function sendMessage(){
  const text=input.value.trim();
  if(!text||isSending) return;

  isSending=true;
  input.value="";
  input.disabled=true;
  setLoading(true);

  appendTimeTagIfNeeded(Date.now());
  appendBubble("user", text);
  showTyping();

  try{
    const resp = await fetch("/send",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({text})
    });

    const reader  = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf="", firstSeg=true;

    while(true){
      const {done,value} = await reader.read();
      if(done) break;
      buf += decoder.decode(value,{stream:true});

      const lines = buf.split("\n\n");
      buf = lines.pop();

      for(const chunk of lines){
        const line=chunk.replace(/^data:\s*/,"").trim();
        if(!line) continue;
        try{
          const ev=JSON.parse(line);
          if(ev.type==="segment"){
            if(firstSeg){ hideTyping(); firstSeg=false; }
            appendBubble("assistant", ev.text);
          } else if(ev.type==="done"){
            hideTyping();
          } else if(ev.type==="error"){
            hideTyping();
            appendBubble("assistant","⚠️ "+ev.msg);
          }
        }catch{}
      }
    }
  }catch(e){
    hideTyping();
    appendBubble("assistant","⚠️ 网络异常，请稍后再试");
  }

  setLoading(false);
  input.disabled=false;
  input.focus();
  isSending=false;
}

// ===== 事件 =====
document.getElementById("btn-send").addEventListener("click", sendMessage);
document.getElementById("btn-settings").addEventListener("click", ()=>{ window.location.href="/settings"; });
input.addEventListener("keydown", e=>{
  if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); sendMessage(); }
});

// ===== 启动 =====
(async()=>{
  await loadConfig();
  await loadHistory();
  input.focus();
})();
</script>
</body>
</html>
